        working-directory: generated-game
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: 整理构建产物
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p generated-game/output
          cp generated-game/app/build/outputs/apk/debug/app-debug.apk "generated-game/output/星豆迷宫.apk"
          sha256sum "generated-game/output/星豆迷宫.apk" | tee generated-game/output/SHA256.txt

      - name: 上传星豆迷宫 APK
        uses: actions/upload-artifact@v4
        with:
          name: 星豆迷宫-1.2.0-操控视觉音效优化版APK
          path: |
            generated-game/output/星豆迷宫.apk
            generated-game/output/SHA256.txt
          if-no-files-found: error
          retention-days: 30
