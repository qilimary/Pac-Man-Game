              private void drawMapCard(Canvas canvas, RectF r, Theme t, int index) {
                  paint.setShader(new LinearGradient(r.left, r.top, r.right, r.bottom,
                          mixColor(t.dark, Color.WHITE, 0.08f), mixColor(t.dark, Color.BLACK, 0.25f),
                          Shader.TileMode.CLAMP));
                  canvas.drawRoundRect(r, viewW * 0.035f, viewW * 0.035f, paint);
                  paint.setShader(null);
                  strokePaint.setStrokeWidth(viewW * 0.004f);
                  strokePaint.setColor(Color.argb(180, Color.red(t.accent), Color.green(t.accent), Color.blue(t.accent)));
                  canvas.drawRoundRect(r, viewW * 0.035f, viewW * 0.035f, strokePaint);
                  float iconX = r.centerX();
                  float iconY = r.top + r.height() * 0.32f;
                  float size = Math.min(r.width(), r.height()) * 0.13f;
                  switch (index) {
                      case 0: drawMiniClown(canvas, iconX, iconY, size * 1.3f); break;
                      case 1: drawPacShape(canvas, iconX, iconY, size, Dir.RIGHT, 0xFFFFD84A); break;
                      case 2: drawFish(canvas, iconX, iconY, size * 1.5f, 0xFF56D8FF, false, 0); break;
                      case 3: drawFirecracker(canvas, iconX, iconY, size * 1.1f, true); break;
                      case 4: drawPlanet(canvas, iconX, iconY, size, 0xFF9B8DFF); break;
                  }
                  drawCenteredText(canvas, t.title, r.centerX(), r.top + r.height() * 0.61f,
                          viewW * 0.040f, Color.WHITE);
                  drawCenteredText(canvas, t.subtitle, r.centerX(), r.top + r.height() * 0.78f,
                          viewW * 0.0215f, 0xFFD8DEFA);
                  int best = prefs.getInt("最高分_" + index, 0);
                  drawCenteredText(canvas, best > 0 ? "最高分 " + best : "点击进入", r.centerX(),
                          r.top + r.height() * 0.92f, viewW * 0.0195f, t.accent);
              }
          
